name: Postman API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  postman-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Newman and HTML reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create test results folder
        run: mkdir -p test-results

      - name: Run Postman collection
        id: newman
        continue-on-error: true
        run: |
          newman run "tests/Collection.json" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export "test-results/newman-report.html"

      - name: Show generated report files
        if: always()
        run: |
          echo "Test result files:"
          ls -la test-results || true

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-test-report
          path: test-results/
          if-no-files-found: warn

      - name: Fail workflow if API tests failed
        if: steps.newman.outcome == 'failure'
        run: exit 1
